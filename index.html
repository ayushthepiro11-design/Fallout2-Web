<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Play Fallout 2 in your browser. Drag and drop your game files to start.">
  <meta name="theme-color" content="#050d05">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☢</text></svg>">
  <title>Fallout 2 - Web Port</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☢</text></svg>">
  <link rel="preload" href="fallout2-ce.js" as="script">
  <link rel="preload" href="fallout2-ce.wasm" as="fetch" crossorigin="anonymous">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background-color: #050d05; 
      color: #33ff33; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      overflow: hidden; 
      font-family: 'Courier New', Courier, monospace;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
    }
    
    /* Hide system cursor globally when game is active */
    body.game-running, html.game-running, body.game-running * {
      cursor: none !important;
    }
    
    /* CRT Scanline overlay — uses will-change for GPU compositing */
    body::after {
      content: " ";
      display: block;
      position: fixed;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 999;
      background-size: 100% 4px, 3px 100%;
      pointer-events: none;
      will-change: transform;
    }

    canvas { 
      border: 0px none; 
      background-color: black; 
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: none;
      /* GPU acceleration for canvas element */
      will-change: contents;
      transform: translateZ(0);
    }

    #start-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, #0a1c0a 0%, #020702 100%);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      z-index: 100;
      padding: 20px;
      border: 4px solid #113311;
    }

    .terminal-container {
      width: 100%;
      max-width: 600px;
      border: 2px solid #33ff33;
      padding: 30px;
      background: rgba(5, 20, 5, 0.85);
      box-shadow: 0 0 15px rgba(51, 255, 51, 0.3);
      border-radius: 4px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      text-align: center;
      text-shadow: 0 0 10px #33ff33;
      letter-spacing: 2px;
      border-bottom: 2px solid #33ff33;
      padding-bottom: 10px;
    }

    .status-text {
      font-size: 14px;
      margin-bottom: 25px;
      line-height: 1.6;
      min-height: 50px;
      text-shadow: 0 0 5px #33ff33;
    }

    /* Upload progress bar */
    #upload-progress {
      display: none;
      width: 100%;
      height: 20px;
      background: rgba(51, 255, 51, 0.1);
      border: 1px solid #33ff33;
      border-radius: 2px;
      margin-bottom: 15px;
      overflow: hidden;
    }
    #upload-progress-bar {
      height: 100%;
      width: 0%;
      background: #33ff33;
      transition: width 0.2s ease;
      box-shadow: 0 0 8px #33ff33;
    }

    /* Drag and Drop Zone */
    #upload-zone {
      border: 2px dashed #33ff33;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      background: rgba(51, 255, 51, 0.05);
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }
    #upload-zone:hover, #upload-zone.dragover {
      background: rgba(51, 255, 51, 0.15);
      box-shadow: 0 0 15px rgba(51, 255, 51, 0.2);
    }
    #upload-zone p {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    #upload-zone span {
      font-size: 12px;
      color: #22aa22;
    }

    /* Hidden File Input */
    #file-input { display: none; }

    /* Launch Button */
    .btn {
      display: none;
      width: 100%;
      padding: 15px;
      background: #33ff33;
      color: #050d05;
      border: none;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      font-family: inherit;
      box-shadow: 0 0 10px #33ff33;
      transition: all 0.2s ease;
    }
    .btn:hover {
      background: #55ff55;
      box-shadow: 0 0 20px #55ff55;
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Reset Button */
    .btn-reset {
      display: none;
      width: 100%;
      padding: 12px;
      background: transparent;
      color: #ff3333;
      border: 2px solid #ff3333;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      font-family: inherit;
      margin-top: 15px;
      box-shadow: 0 0 5px rgba(255, 51, 51, 0.3);
      transition: all 0.2s ease;
    }
    .btn-reset:hover {
      background: rgba(255, 51, 51, 0.1);
      box-shadow: 0 0 15px rgba(255, 51, 51, 0.5);
    }

    /* Fullscreen re-entry banner */
    #fs-banner {
      display: none;
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: rgba(51, 255, 51, 0.15);
      color: #33ff33; text-align: center;
      padding: 8px; font-size: 13px; z-index: 200;
      cursor: pointer; backdrop-filter: blur(4px);
      border-top: 1px solid rgba(51, 255, 51, 0.3);
      animation: fadeIn 0.3s;
    }
    #fs-banner:hover { background: rgba(51, 255, 51, 0.25); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Loading overlay during game boot */
    #loading-overlay {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(5, 13, 5, 0.95);
      z-index: 500;
      justify-content: center; align-items: center;
      flex-direction: column;
      color: #33ff33;
      font-size: 18px;
    }
    #loading-overlay .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(51, 255, 51, 0.2);
      border-top: 3px solid #33ff33;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="start-screen">
    <div class="terminal-container">
      <h1>☢ V.A.S.T. BOOT LOADER v1.0 ☢</h1>
      <div id="status" class="status-text">Connecting to local databanks...</div>
      
      <div id="upload-progress"><div id="upload-progress-bar"></div></div>

      <div id="upload-zone" onclick="document.getElementById('file-input').click()">
        <p>DRAG & DROP DAT FILES HERE</p>
        <span>or click to browse your PC</span>
        <br><br>
        <span style="color:#ffaa00">Required: MASTER.DAT & CRITTER.DAT</span>
      </div>
      <input type="file" id="file-input" multiple accept=".dat">

      <button id="launch-btn" class="btn" onclick="launchGame()">Initialize Game Runtime</button>
      <button id="reset-btn" class="btn-reset" onclick="resetFiles()">Reset Stored Game Files</button>
    </div>
  </div>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text">Extracting databanks to WASM memory...</div>
  </div>

  <div id="fs-banner" onclick="goFullscreen()">⛶ Click here or press F11 to return to fullscreen</div>
  <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="1"></canvas>

  <script type='text/javascript'>
    // ─── PWA Service Worker Registration ───
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then((registration) => {
          console.log('ServiceWorker registered with scope:', registration.scope);
        }).catch((error) => {
          console.error('ServiceWorker registration failed:', error);
        });
      });
    }

    // ─── Performance: Single DB connection pool ───
    const DB_NAME = 'Fallout2WebDB';
    const STORE_NAME = 'files';
    let _dbInstance = null;

    async function openDB() {
      if (_dbInstance) return _dbInstance;
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME);
          }
        };
        request.onsuccess = (e) => {
          _dbInstance = e.target.result;
          // Reset pool on unexpected close
          _dbInstance.onclose = () => { _dbInstance = null; };
          resolve(_dbInstance);
        };
        request.onerror = (e) => reject(e.target.error);
      });
    }

    async function getFile(key) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(STORE_NAME, 'readonly');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.get(key);
        request.onsuccess = (e) => resolve(e.target.result);
        request.onerror = (e) => reject(e.target.error);
      });
    }

    async function saveFile(key, blob) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(STORE_NAME, 'readwrite');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.put(blob, key);
        request.onsuccess = () => resolve();
        request.onerror = (e) => reject(e.target.error);
      });
    }

    // ─── DOM Cache (avoid repeated lookups) ───
    const uploadZone = document.getElementById('upload-zone');
    const fileInput = document.getElementById('file-input');
    const statusText = document.getElementById('status');
    const launchBtn = document.getElementById('launch-btn');
    const resetBtn = document.getElementById('reset-btn');
    const canvasEl = document.getElementById('canvas');
    const fsBanner = document.getElementById('fs-banner');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText = document.getElementById('loading-text');
    const uploadProgress = document.getElementById('upload-progress');
    const uploadProgressBar = document.getElementById('upload-progress-bar');

    // ─── Drag & Drop handlers ───
    uploadZone.addEventListener('dragenter', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); }, false);
    uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); }, false);
    uploadZone.addEventListener('dragleave', (e) => { e.preventDefault(); uploadZone.classList.remove('dragover'); }, false);
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    }, false);
    fileInput.addEventListener('change', () => handleFiles(fileInput.files));

    // ─── File validation & upload with progress ───
    async function handleFiles(files) {
      let masterFile = null;
      let critterFile = null;

      for (const file of files) {
        const name = file.name.toLowerCase();
        if (name === 'master.dat') masterFile = file;
        if (name === 'critter.dat') critterFile = file;
      }

      if (!masterFile && !critterFile) {
        statusText.innerHTML = "<span style='color:red;'>Error: No valid game files detected. Please drop MASTER.DAT or CRITTER.DAT.</span>";
        return;
      }

      // Validate file sizes (MASTER.DAT ~163MB, CRITTER.DAT ~37MB)
      if (masterFile && masterFile.size < 1000000) {
        statusText.innerHTML = "<span style='color:red;'>Error: MASTER.DAT seems too small. Please use the original game file.</span>";
        return;
      }
      if (critterFile && critterFile.size < 500000) {
        statusText.innerHTML = "<span style='color:red;'>Error: CRITTER.DAT seems too small. Please use the original game file.</span>";
        return;
      }

      uploadProgress.style.display = 'block';
      const totalFiles = (masterFile ? 1 : 0) + (critterFile ? 1 : 0);
      let done = 0;

      try {
        if (masterFile) {
          statusText.innerText = 'Saving MASTER.DAT to browser storage...';
          uploadProgressBar.style.width = '10%';
          await saveFile('master.dat', masterFile);
          done++;
          uploadProgressBar.style.width = Math.round((done / totalFiles) * 100) + '%';
        }
        if (critterFile) {
          statusText.innerText = 'Saving CRITTER.DAT to browser storage...';
          uploadProgressBar.style.width = (done > 0 ? '60%' : '10%');
          await saveFile('critter.dat', critterFile);
          done++;
          uploadProgressBar.style.width = '100%';
        }
        statusText.innerText = 'Files saved successfully!';
        setTimeout(() => { uploadProgress.style.display = 'none'; }, 800);
        checkFiles();
      } catch (err) {
        console.error(err);
        uploadProgress.style.display = 'none';
        statusText.innerHTML = "<span style='color:red;'>Storage failed. Browser storage might be full or restricted.</span>";
      }
    }

    var cachedMasterBlob = null;
    var cachedCritterBlob = null;

    async function checkFiles() {
      try {
        cachedMasterBlob = await getFile('master.dat');
        cachedCritterBlob = await getFile('critter.dat');

        if (cachedMasterBlob && cachedCritterBlob) {
          statusText.innerHTML = "SYSTEM READY.<br>MASTER.DAT (" + (cachedMasterBlob.size / 1024 / 1024).toFixed(1) + " MB) and CRITTER.DAT (" + (cachedCritterBlob.size / 1024 / 1024).toFixed(1) + " MB) loaded from local databanks.";
          launchBtn.style.display = 'block';
          resetBtn.style.display = 'block';
          uploadZone.style.display = 'none';
        } else {
          statusText.innerHTML = "WARNING: Game databanks missing.<br>Please select or drag & drop MASTER.DAT and CRITTER.DAT from your local GOG or Steam installation folder to compile.";
          launchBtn.style.display = 'none';
          resetBtn.style.display = 'none';
          uploadZone.style.display = 'block';
        }
      } catch (err) {
        console.error(err);
      }
    }

    async function resetFiles() {
      if (confirm('Clear stored MASTER.DAT and CRITTER.DAT from your browser storage?')) {
        try {
          const db = await openDB();
          const transaction = db.transaction(STORE_NAME, 'readwrite');
          const store = transaction.objectStore(STORE_NAME);
          store.clear();
          transaction.oncomplete = () => {
            _dbInstance = null;
            location.reload();
          };
        } catch (err) {
          console.error(err);
          alert('Failed to reset storage: ' + err.message);
        }
      }
    }

    // Run check on load
    checkFiles();

    // ─── Emscripten Game Module ───
    var Module = {
      canvas: (function() {
        canvasEl.addEventListener("webglcontextlost", function(e) { 
          alert('WebGL context lost. You will need to reload the page.'); 
          e.preventDefault(); 
        }, false);
        // Attempt to restore context automatically
        canvasEl.addEventListener("webglcontextrestored", function() {
          console.log('WebGL context restored.');
        }, false);
        return canvasEl;
      })(),
      print: function(text) { if (typeof console !== 'undefined') console.log(text); },
      printErr: function(text) { if (typeof console !== 'undefined') console.error(text); },
      // Emscripten memory optimization: request 256MB initial, 512MB max
      INITIAL_MEMORY: 268435456,
      MAXIMUM_MEMORY: 536870912,
      mouseState: {dx: 0, dy: 0, lb: 0, rb: 0},
      onRuntimeInitialized: function() {
        // Hide loading overlay EXACTLY when the C++ engine has booted and compiled the WASM
        const loadingOverlay = document.getElementById('loading-overlay');
        if (loadingOverlay) loadingOverlay.style.display = 'none';
        
        if (typeof resizeCanvas === 'function') resizeCanvas();
      }
    };

    // ─── Optimized Mouse Input (Absolute to Relative Bridge) ───
    // FocuSee and other screen recorders track the physical OS cursor. 
    // To prevent the game's software cursor from drifting away from the OS cursor, 
    // we map absolute OS coordinates to the 640x480 internal game resolution
    // and inject precise deltas into the engine.
    var virtualX = 320; // Game cursor boots at center of 640x480
    var virtualY = 240;
    
    document.addEventListener('mousemove', function(e) {
      if (!canvasEl.getBoundingClientRect) return;
      var rect = canvasEl.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return;

      // Calculate absolute OS cursor mapped to game 640x480 space
      var normX = (e.clientX - rect.left) / rect.width;
      var normY = (e.clientY - rect.top) / rect.height;
      var targetX = Math.round(normX * 640);
      var targetY = Math.round(normY * 480);
      
      // Clamp to game bounds so virtualX never drifts from internal engine bounds
      targetX = Math.max(0, Math.min(639, targetX));
      targetY = Math.max(0, Math.min(479, targetY));

      // Inject the exact delta required to snap the game cursor to the OS cursor
      Module.mouseState.dx += (targetX - virtualX);
      Module.mouseState.dy += (targetY - virtualY);
      
      virtualX = targetX;
      virtualY = targetY;
    }, { passive: true });

    document.addEventListener('mousedown', function(e) {
      if (e.button === 0) Module.mouseState.lb = 1;
      if (e.button === 2) Module.mouseState.rb = 1;
    }, { passive: false });

    document.addEventListener('mouseup', function(e) {
      if (e.button === 0) Module.mouseState.lb = 0;
      if (e.button === 2) Module.mouseState.rb = 0;
    }, { passive: true });

    // ─── Pointer Lock for smoother in-game mouse ───
    function requestPointerLock() {
      if (canvasEl.requestPointerLock) {
        canvasEl.requestPointerLock();
      }
    }

    // ─── Fullscreen ───
    function goFullscreen() {
      var el = document.documentElement;
      var rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
      if (rfs) rfs.call(el);
      fsBanner.style.display = 'none';
    }

    function isFullscreen() {
      return !!(document.fullscreenElement || document.webkitFullscreenElement);
    }

    var gameStarted = false;

    function onFsChange() {
      if (!gameStarted) return;
      if (isFullscreen()) {
        fsBanner.style.display = 'none';
      } else {
        fsBanner.style.display = 'block';
      }
      resizeCanvas();
    }
    document.addEventListener('fullscreenchange', onFsChange);
    document.addEventListener('webkitfullscreenchange', onFsChange);

    // ─── Debounced Canvas Resize (avoids layout thrashing) ───
    let _resizeTimer = null;
    function resizeCanvas() {
      if (!canvasEl || !canvasEl.width) return;
      var gameW = 640, gameH = 480;
      var winW = window.innerWidth, winH = window.innerHeight;
      var scale = Math.min(winW / gameW, winH / gameH);
      canvasEl.style.width = Math.floor(gameW * scale) + 'px';
      canvasEl.style.height = Math.floor(gameH * scale) + 'px';
    }

    window.addEventListener('resize', function() {
      if (_resizeTimer) cancelAnimationFrame(_resizeTimer);
      _resizeTimer = requestAnimationFrame(resizeCanvas);
    });

    // ─── Keyboard handlers (Set for capture) ───
    const BLOCKED_CTRL_KEYS = new Set(['s','o','p','w','n','t','f','g','h','l','d','u','j','k']);

    document.addEventListener('keydown', function(e) {
      if (!gameStarted) return;

      // Block browser Ctrl+Key shortcuts
      if (e.ctrlKey && BLOCKED_CTRL_KEYS.has(e.key.toLowerCase())) {
        e.preventDefault();
        return;
      }
      // F11 fullscreen toggle
      if (e.key === 'F11') {
        e.preventDefault();
        if (isFullscreen()) {
          var eFS = document.exitFullscreen || document.webkitExitFullscreen;
          if (eFS) eFS.call(document);
        } else {
          goFullscreen();
        }
        return;
      }
      // Block Tab and body Backspace
      if (e.key === 'Tab') e.preventDefault();
      if (e.key === 'Backspace' && e.target === document.body) e.preventDefault();
    }, { capture: true });

    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

    // Prevent scroll/zoom gestures on the canvas
    canvasEl.addEventListener('wheel', function(e) { 
      if (gameStarted) e.preventDefault(); 
    }, { passive: false });

    canvasEl.addEventListener('touchstart', function(e) {
      if (gameStarted) e.preventDefault();
    }, { passive: false });

    // ─── Visibility API: pause audio context when tab is hidden ───
    document.addEventListener('visibilitychange', function() {
      if (!gameStarted) return;
      // Emscripten SDL audio context
      if (typeof SDL !== 'undefined' && SDL.audioContext) {
        if (document.hidden) {
          SDL.audioContext.suspend();
        } else {
          SDL.audioContext.resume();
        }
      }
    });

    // ─── Launch Game ───
    async function launchGame() {
      if (!cachedMasterBlob || !cachedCritterBlob) return;

      // Prevent double-click
      launchBtn.disabled = true;
      launchBtn.innerText = 'LOADING...';

      // Trigger fullscreen immediately synchronously with the user click
      goFullscreen();

      // Show loading overlay
      loadingOverlay.style.display = 'flex';
      loadingText.innerText = 'Extracting databanks to WASM memory...';

      // Give the UI a frame to paint the overlay before heavy work
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

      try {
        // Read both DAT files in parallel for faster loading
        loadingText.innerText = 'Reading MASTER.DAT & CRITTER.DAT...';
        const [masterBuffer, critterBuffer] = await Promise.all([
          cachedMasterBlob.arrayBuffer(),
          cachedCritterBlob.arrayBuffer()
        ]);

        loadingText.innerText = 'Preparing WASM filesystem...';

        Module.preRun = Module.preRun || [];
        Module.preRun.push(function() {
          // Mount IDBFS for persistent savegames in IndexedDB
          try {
            // Emscripten config directories
            FS.mkdir('/home');
            FS.mkdir('/home/web_user');
            FS.mkdir('/home/web_user/.config');
            FS.mkdir('/home/web_user/.config/fallout2-ce');
            FS.mount(IDBFS, {}, '/home/web_user/.config/fallout2-ce');
          } catch(e) {
            console.warn('IDBFS mount on home config failed:', e);
          }

          FS.writeFile('master.dat', new Uint8Array(masterBuffer));
          FS.writeFile('critter.dat', new Uint8Array(critterBuffer));
          FS.writeFile('ddraw.ini', '[Misc]\nSkipOpeningMovies=1\n');
          
          // Disable C++ level fullscreen which crashes Emscripten
          FS.writeFile('f2_res.ini', '[MAIN]\nWINDOWED=1\n');
          
          // Default config
          const cfgContent = `[sound]\nmusic_path2=sound\\music\\\nsound_path2=sound\\sfx\\\n\n[system]\ncritter_dat=critter.dat\ncritter_patches=data\nmaster_dat=master.dat\nmaster_patches=data\n`;
          FS.writeFile('fallout2.cfg', cfgContent);

          // Create required directories
          try { FS.mkdir('data'); } catch(e) {}
          
          try {
            // Create game save directory and mount IDBFS as fallback
            FS.mkdir('data/savegame');
            FS.mount(IDBFS, {}, 'data/savegame');
          } catch(e) {
            console.warn('IDBFS mount on data/savegame failed:', e);
          }

          try { FS.mkdir('sound'); } catch(e) {}
          try { FS.mkdir('sound/music'); } catch(e) {}
          try { FS.mkdir('sound/sfx'); } catch(e) {}

          // Synchronize from IndexedDB to virtual filesystem on boot
          FS.syncfs(true, function(err) {
            if (err) console.error('Failed to syncfs from IDBFS:', err);
            else console.log('Successfully synced savegames from IDBFS');
          });
        });

        // Set up auto-syncing of save games from MEMFS back to IDBFS every 5 seconds
        setInterval(function() {
          if (gameStarted && typeof FS !== 'undefined') {
            FS.syncfs(false, function(err) {
              if (err) console.error('Auto-sync of savegames to IDBFS failed:', err);
            });
          }
        }, 5000);

        // Hide start screen
        document.getElementById('start-screen').style.display = 'none';
        gameStarted = true;

        // Add game-running CSS class
        document.body.classList.add('game-running');
        document.documentElement.classList.add('game-running');

        // Load fallout2-ce runtime
        loadingText.innerText = 'Booting Fallout 2 engine...';
        var script = document.createElement('script');
        script.src = 'fallout2-ce.js';
        script.async = true;
        // script.onload is no longer responsible for hiding the overlay,
        // Module.onRuntimeInitialized handles it precisely when the WASM is fully compiled.
        script.onload = function() {
          console.log('Engine JS parsed, compiling WASM...');
        };
        script.onerror = function() {
          loadingOverlay.style.display = 'none';
          alert('Failed to load game engine (fallout2-ce.js). Please refresh and try again.');
        };
        document.body.appendChild(script);

        // Resize checks
        setTimeout(resizeCanvas, 2000);
        setTimeout(resizeCanvas, 5000);
        setTimeout(resizeCanvas, 10000);

      } catch (err) {
        console.error('Launch error:', err);
        loadingOverlay.style.display = 'none';
        launchBtn.disabled = false;
        launchBtn.innerText = 'Initialize Game Runtime';
        alert('Failed to launch: ' + err.message);
      }
    }
  </script>
</body>
</html>
